<body class="page-home">

  <!-- ── HERO ── -->
  <section class="hero" id="home-section">
    <h1 class="hero-name">
      <span data-i18n="home.name">Stefano</span>

    <div class="hero-actions">
      <a href="#personal-section" class="btn-primary" data-i18n="home.btn_personal">Vita Personale</a>
      <a href="#work-section" class="btn-secondary" data-i18n="home.btn_work">Vita Lavorativa</a>
    </div>
  </section>

  <!-- ── ANTEPRIMA PERSONALE ── -->
  <section
    class="page-fragment"
    id="personal-section" 
    data-fragment-url="vita-personale.html"
    data-fragment-source="personal-section-source">
  </section>

  <!-- ── ANTEPRIMA LAVORATIVA ── -->

    class="page-fragment"
    id="work-section"
    data-fragment-url="vita-lavorativa.html"
    data-fragment-source="work-section-source">
  </section>

  <!-- ── FOOTER CONTATTI ── -->
  <footer class="footer" id="contatti">
    <p class="footer-label" data-i18n="footer.title"></p>
    <div class="footer-links">
      <a href="https://www.instagram.com/ste_catalin_/" target="_blank" rel="noopener noreferrer" data-i18n="footer.instagram"></a>
      <a href="https://github.com/StefaDale" target="_blank" rel="noopener noreferrer" data-i18n="footer.github"></a>
    </div>
    <p class="footer-copy" data-i18n="footer.copyright"></p>
  </footer>

  <!-- ── MODAL CONTATTI ── -->
  <div class="modal-overlay" id="modal-contatti" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-intro" tabindex="-1">
      <button class="modal-close" id="btn-close-modal" type="button" data-i18n-aria-label="modal.close">✕</button>
      <h2 id="modal-title" data-i18n="modal.title"></h2>
      <p class="modal-intro" id="modal-intro" data-i18n="modal.intro"></p>
      <form class="contact-form" id="contact-form">
        <label for="contact-name" data-i18n="modal.name_label"></label>
        <input id="contact-name" name="name" type="text" autocomplete="name" data-i18n-placeholder="modal.name_placeholder" required>

        <label for="contact-email" data-i18n="modal.email_label"></label>
        <input id="contact-email" name="email" type="email" autocomplete="email" data-i18n-placeholder="modal.email_placeholder" required>
        <div class="email-verification">
          <button class="email-verify-send" id="email-verify-send" type="button" data-i18n="modal.verify_send"></button>
          <label class="sr-only" for="email-code" data-i18n="modal.code_label"></label>
          <input id="email-code" name="email_code" type="text" inputmode="numeric" autocomplete="one-time-code" data-i18n-placeholder="modal.code_placeholder" aria-describedby="email-verification-status">
          <button class="email-verify-check" id="email-verify-check" type="button" data-i18n="modal.verify_check"></button>
        </div>
        <p class="email-verification-status" id="email-verification-status" role="status" aria-live="polite"></p>

        <label for="contact-message" data-i18n="modal.message_label"></label>
        <textarea id="contact-message" name="message" rows="5" data-i18n-placeholder="modal.message_placeholder" required></textarea>

        <button class="contact-submit" type="submit" data-i18n="modal.submit"></button>
      </form>
      <p class="contact-form-status" id="contact-form-status" role="status" aria-live="polite"></p>
      <p class="contact-form-hint" data-i18n="modal.mail_hint"></p>
      <ul class="modal-list">
        <li>📸 <a href="https://www.instagram.com/ste_catalin_/" target="_blank" rel="noopener noreferrer" data-i18n="footer.instagram"></a></li>
        <li>💻 <a href="https://github.com/StefaDale" target="_blank" rel="noopener noreferrer" data-i18n="footer.github"></a></li>
      </ul>
    </div>
  </div>
